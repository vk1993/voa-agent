version: '3.8'

services:
  localstack:
    container_name: voxa-localstack
    platform: linux/arm64
    image: localstack/localstack:latest
    ports:
      - "4566:4566"            # LocalStack Edge Port (Unified API endpoint)
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=sqs,secretsmanager,dynamodb
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro"
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voxa
      POSTGRES_PASSWORD: voxa
      POSTGRES_DB: voxa_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
