name: Deploy Backend to AWS (CDK)

on:
  push:
    branches:
      - main
    paths:
      - 'aws-infra/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Install CDK Stack Dependencies
        run: |
          cd aws-infra
          pip install -r requirements.txt

      - name: Verify AWS Region
        run: |
          echo "Deploying to region: ${{ env.AWS_DEFAULT_REGION }}"
          if [ "${{ secrets.AWS_REGION }}" == "" ]; then
            echo "⚠️  AWS_REGION secret not set. Defaulting to ap-south-1."
          fi

      - name: Deploy Serverless Stack
        run: |
          cd aws-infra
          npx cdk deploy --require-approval never
