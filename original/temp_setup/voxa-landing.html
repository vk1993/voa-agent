/* ── FADE UP HOOK ── */
function useFade(delay=0){
  const ref=useRef(null);
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const show=()=>setVisible(true);
    const ob=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){show();ob.disconnect();}
    },{threshold:.12});
    const t=setTimeout(()=>{
      ob.observe(el);
      requestAnimationFrame(()=>{
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight&&r.bottom>0){show();ob.disconnect();}
      });
    },delay);
    return()=>{clearTimeout(t);ob.disconnect();};
  },[delay]);
  return [ref,visible];
}
function F({delay=0,children,style={}}){
  const [r,visible]=useFade(delay);
  return <div ref={r} className={`fade-in${visible?' on':''}`} style={style}>{children}</div>;
}

          {STEPS.map((s,i)=>(
            <F key={i} delay={i*70} style={{flex:1}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',padding:'0 8px'}}>

                  border:`1.5px solid color-mix(in srgb,${s.col} 32%,transparent)`,

                  <span style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,color:s.col}}>{s.n}</span>
                  {i<4&&<div style={{position:'absolute',right:-20,top:'50%',transform:'translateY(-50%)',

                  letterSpacing:'.1em',marginBottom:10}}>{s.lbl}</div>

            </F>
          ))}
        </div>
        <F delay={350}><div style={{textAlign:'center',marginTop:50,

          border:'1px solid rgba(255,255,255,.05)',borderRadius:12,maxWidth:640,margin:'50px auto 0'}}>

            Then it scores the call, tags the lead, and updates your CRM — all before you hang up.

    </section>

}

              <button key={i} onClick={()=>setAnnual(i===1)} style={{
                padding:'8px 20px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'var(--body)',

                boxShadow:p.featured?`0 0 70px ${acc}18`:'none'}}>

                  background:acc,color:'#0F0F12',fontFamily:'var(--mono)',fontSize:9.5,fontWeight:700,
                  padding:'4px 12px',borderRadius:20,letterSpacing:'.08em',whiteSpace:'nowrap'}}>MOST POPULAR</div>}
                <div style={{fontFamily:'var(--mono)',fontSize:10.5,fontWeight:600,letterSpacing:'.1em',

                  <span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--txt2)'}}>{p.unit}</span>
                </div>
                <div style={{fontSize:13,color:'var(--txt2)',marginBottom:22}}>{p.sub}</div>
                <div style={{height:1,background:'rgba(255,255,255,.06)',marginBottom:20}}/>
                <div style={{display:'flex',flexDirection:'column',gap:11,marginBottom:26}}>

                    <div key={j} style={{display:'flex',gap:9,alignItems:'flex-start'}}>
